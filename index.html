<!DOCTYPE html>
<html lang="sr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finishers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url('background.png') center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #counter-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    #unit {
      font-family: 'Poppins', sans-serif;
      font-size: 90px;
      font-weight: 400;
      color: #ffffff;
      margin-left: 12px;
      line-height: 1;
      align-self: flex-end;
      padding-bottom: 14px;
    }

    .digit-slot {
      width: 130px;
      height: 190px;
      overflow: hidden;
      position: relative;
    }

    .digit-reel {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .digit-reel span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 190px;
      font-family: 'Poppins', sans-serif;
      font-size: 220px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: none;
      line-height: 1;
      user-select: none;
    }
  </style>
</head>

<body>
  <div style="display:flex; align-items:center; transform:translateX(-80px);">
    <div id="counter-wrap" style="transform:none;"></div>
    <span id="unit">kWh</span>
  </div>

  <script src="counter.js"></script>
</body>

</html>
